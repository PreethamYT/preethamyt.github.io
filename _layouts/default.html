<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  {% feed_meta %}
  {% seo %}
</head>
<body>

  <header class="site-header">
    <nav class="nav-inner">
      <a class="nav-logo" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <div class="nav-links">
        <a href="{{ '/about' | relative_url }}">About</a>
      </div>
    </nav>
  </header>

  <main class="main-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span>{{ site.title }}</span>
      <div class="footer-links">
        <a href="https://github.com/PreethamYT" target="_blank" rel="noopener">GitHub</a>
        <a href="https://www.youtube.com/@ConsciousCoder.06" target="_blank" rel="noopener">YouTube</a>
        <a href="https://www.linkedin.com/in/preethamyt/" target="_blank" rel="noopener">LinkedIn</a>
      </div>
    </div>
  </footer>

</body>
</html>
